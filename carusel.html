<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Фотолента - Туры по России</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <h2 class="page-title">Фотолента: красивые места России</h2>

        <div id="carousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="images/baikal.jpg" class="d-block w-100" alt="Байкал"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Байкал'">
                </div>
                <div class="carousel-item">
                    <img src="images/altai.jpg" class="d-block w-100" alt="Алтай"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Алтай'">
                </div>
                <div class="carousel-item">
                    <img src="images/kamchatka.jpg" class="d-block w-100" alt="Камчатка"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Камчатка'">
                </div>
                <div class="carousel-item">
                    <img src="images/forest.jpg" class="d-block w-100" alt="Лес"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Лес'">
                </div>
                <div class="carousel-item">
                    <img src="images/mountain.jpg" class="d-block w-100" alt="Горы"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Горы'">
                </div>
                <div class="carousel-item">
                    <img src="images/lake.jpg" class="d-block w-100" alt="Озеро"
                        onerror="this.src='https://via.placeholder.com/1000x450?text=Озеро'">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <div class="nav-links">
            <a href="index.html">Главная</a> |
            <a href="cards.html">Карточки</a> |
            <a href="gallery.html">Галерея</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
